spring:
  application:
    name: auth-server

  datasource:
    url: jdbc:postgresql://localhost:5432/authdb
    username: authuser
    password: authpassword
    driver-class-name: org.postgresql.Driver
    hikari:
      connection-timeout: 20000
      maximum-pool-size: 10
      minimum-idle: 5

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    open-in-view: false

  data:
    redis:
      host: localhost
      port: 6379
      timeout: 60000

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID:client_id}
            client-secret: ${GOOGLE_CLIENT_SECRET:client_secret}
            scope:
              - email
              - profile

jwt:
  secret: ${JWT_SECRET:bXlzdXBlcnNlY3JldGtleXRoYXRpc2F0bGVhc3QzMmJ5dGVz}
  expiration: 3600000       # 1 hour in milliseconds
  refresh-expiration: 604800 # 7 days in seconds

app:
  oauth2:
    redirect-uri: http://localhost:3000/oauth2/callback

server:
  port: 8080
  error:
    include-message: always
    include-binding-errors: always

logging:
  level:
    root: WARN
    com.project.auth: DEBUG
    org.springframework.security: INFO
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} %-5level [%thread] %logger{36} — %msg%n"
  file:
    name: logs/auth-server.log